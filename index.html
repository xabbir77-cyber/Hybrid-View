<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid View | Ultimate Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        .light-mode { --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: 0.3s; overflow: hidden; }
        
        .main-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; height: calc(100vh - 100px); margin-top: 80px; padding: 20px; }
        @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; overflow-y: auto; height: auto; } }
        
        .panel { background: var(--card); border-radius: 30px; padding: 25px; position: relative; border: 1px solid rgba(139, 92, 246, 0.1); overflow-y: auto; }
        .panel.expanded { position: fixed; inset: 80px 20px 20px 20px; z-index: 40; }
        .panel.hidden { display: none; }

        .media-card { background: rgba(139, 92, 246, 0.03); border-radius: 20px; padding: 10px; border: 1px solid rgba(139, 92, 246, 0.1); transition: 0.3s; position: relative; }
        
        /* 3-Dot Menu Style */
        .menu-btn { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.4); color: white; padding: 5px; border-radius: 50%; cursor: pointer; }
        .dropdown-menu { position: absolute; top: 40px; right: 10px; background: var(--card); border: 1px solid var(--primary); border-radius: 12px; display: none; flex-direction: column; z-index: 20; box-shadow: 0 10px 15px rgba(0,0,0,0.3); width: 140px; }
        .dropdown-menu button { padding: 10px; text-align: left; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 8px; }
        .dropdown-menu button:last-child { border: none; }
        .dropdown-menu button:hover { background: rgba(139, 92, 246, 0.1); }

        /* Full Screen Viewer */
        #viewer { position: fixed; inset: 0; background: black; z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .viewer-nav { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        
        .nav-blur { background: var(--card); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(139, 92, 246, 0.1); }
        #editorModal { position: fixed; inset: 0; background: var(--card); z-index: 100; display: none; padding: 40px; flex-direction: column; }
    </style>
</head>
<body id="appBody">

    <input type="file" id="imgInp" accept="image/*" class="hidden" onchange="processFile(this, 'image')">
    <input type="file" id="vidInp" accept="video/*" class="hidden" onchange="processFile(this, 'video')">

    <nav class="fixed top-0 w-full z-50 nav-blur px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-purple-600 p-2 rounded-lg text-white"><i data-lucide="shield-check"></i></div>
            <h1 class="text-xl font-bold">Hybrid <span class="text-purple-500">View</span></h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 rounded-xl bg-slate-800/50 text-purple-400"><i data-lucide="sun" id="themeIcon"></i></button>
    </nav>

    <div class="main-grid">
        <div id="p-gal" class="panel" onclick="expand('p-gal')">
            <h2 class="text-lg font-bold text-blue-400 mb-6 flex items-center gap-2"><i data-lucide="image"></i> Gallery</h2>
            <div id="gal-ctx" class="grid grid-cols-2 gap-4"></div>
            <button class="fixed bottom-10 right-10 md:absolute md:bottom-6 md:right-6 bg-blue-600 p-4 rounded-2xl text-white shadow-xl" onclick="openInput('imgInp', event)"><i data-lucide="plus"></i></button>
        </div>

        <div id="p-vid" class="panel" onclick="expand('p-vid')">
            <h2 class="text-lg font-bold text-red-400 mb-6 flex items-center gap-2"><i data-lucide="play-circle"></i> Video Vault</h2>
            <div id="vid-ctx" class="grid grid-cols-2 gap-4"></div>
            <button class="fixed bottom-10 right-10 md:absolute md:bottom-6 md:right-6 bg-red-600 p-4 rounded-2xl text-white shadow-xl" onclick="openInput('vidInp', event)"><i data-lucide="plus"></i></button>
        </div>

        <div id="p-not" class="panel" onclick="expand('p-not')">
            <h2 class="text-lg font-bold text-green-400 mb-6 flex items-center gap-2"><i data-lucide="file-edit"></i> Notes</h2>
            <div id="not-ctx" class="grid grid-cols-1 gap-3"></div>
            <button class="fixed bottom-10 right-10 md:absolute md:bottom-6 md:right-6 bg-green-600 p-4 rounded-2xl text-white shadow-xl" onclick="createNote(event)"><i data-lucide="plus"></i></button>
        </div>
    </div>

    <!-- Full Screen Viewer -->
    <div id="viewer">
        <div class="viewer-nav">
            <button onclick="closeViewer()" class="text-white flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full"><i data-lucide="x"></i> Close</button>
            <div class="flex gap-3" id="viewerActions">
                <!-- Actions will be injected here -->
            </div>
        </div>
        <div id="viewerContent" class="w-full h-full flex items-center justify-center p-4"></div>
    </div>

    <div id="editorModal">
        <div class="flex justify-between items-center mb-6">
            <input type="text" id="edTitle" class="bg-transparent text-2xl font-bold outline-none border-b border-purple-500/30 pb-2 w-2/3">
            <button onclick="saveNote()" class="bg-purple-600 px-8 py-3 rounded-2xl text-white font-bold">Save & Exit</button>
        </div>
        <textarea id="edBody" class="flex-1 bg-slate-800/30 p-8 rounded-3xl outline-none text-lg resize-none"></textarea>
    </div>

    <script>
        let db;
        let config = JSON.parse(localStorage.getItem('hv_v6')) || { notes: [], theme: 'dark' };
        let currentFile = null;

        const req = indexedDB.open("HV_Vault_Plus", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        req.onsuccess = e => { db = e.target.result; render(); };

        function openInput(id, e) { e.stopPropagation(); document.getElementById(id).click(); }

        function processFile(inp, type) {
            const file = inp.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = r => {
                const tx = db.transaction("files", "readwrite");
                tx.objectStore("files").add({
                    id: Date.now(),
                    type: type,
                    name: file.name,
                    data: r.target.result,
                    timestamp: new Date().toLocaleString()
                });
                tx.oncomplete = render;
            };
            reader.readAsDataURL(file);
        }

        function render() {
            if (!db) return;
            const tx = db.transaction("files", "readonly");
            tx.objectStore("files").getAll().onsuccess = e => {
                const files = e.target.result;
                drawMedia('gal-ctx', files.filter(f => f.type === 'image'));
                drawMedia('vid-ctx', files.filter(f => f.type === 'video'));
            };
            drawNotes();
            lucide.createIcons();
        }

        function drawMedia(id, list) {
            document.getElementById(id).innerHTML = list.map(f => `
                <div class="media-card" id="card-${f.id}">
                    <div onclick="openViewer(${f.id})">
                        ${f.type === 'image' ? `<img src="${f.data}" class="w-full h-32 object-cover rounded-xl shadow-md cursor-pointer">` : `<div class="bg-black h-32 rounded-xl flex items-center justify-center cursor-pointer"><i data-lucide="play" class="text-white"></i></div>`}
                    </div>
                    <div class="text-[10px] truncate mt-2 font-bold opacity-50 px-1">${f.name}</div>
                    
                    <button class="menu-btn" onclick="toggleMenu(${f.id}, event)"><i data-lucide="more-vertical" class="w-4 h-4"></i></button>
                    <div class="dropdown-menu" id="menu-${f.id}">
                        <button onclick="downloadReal(${f.id}, event)"><i data-lucide="download" class="w-3 h-3"></i> Download</button>
                        <button onclick="downloadCompose(${f.id}, event)"><i data-lucide="file-text" class="w-3 h-3"></i> Compose</button>
                        <button onclick="shareFile(${f.id}, event)"><i data-lucide="share-2" class="w-3 h-3"></i> Share</button>
                        <button onclick="del(${f.id}, event)" class="text-red-400"><i data-lucide="trash-2" class="w-3 h-3"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleMenu(id, e) {
            e.stopPropagation();
            const allMenus = document.querySelectorAll('.dropdown-menu');
            allMenus.forEach(m => { if(m.id !== 'menu-'+id) m.style.display = 'none'; });
            const menu = document.getElementById('menu-'+id);
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
        });

        function openViewer(id) {
            db.transaction("files").objectStore("files").get(id).onsuccess = ev => {
                const f = ev.target.result;
                currentFile = f;
                const content = document.getElementById('viewerContent');
                content.innerHTML = f.type === 'image' ? `<img src="${f.data}" class="max-w-full max-h-full">` : `<video src="${f.data}" controls autoplay class="max-w-full max-h-full"></video>`;
                
                document.getElementById('viewerActions').innerHTML = `
                    <button onclick="downloadReal(${f.id}, event)" class="bg-green-600 p-3 rounded-full text-white"><i data-lucide="download"></i></button>
                    <button onclick="downloadCompose(${f.id}, event)" class="bg-purple-600 p-3 rounded-full text-white"><i data-lucide="file-text"></i></button>
                    <button onclick="shareFile(${f.id}, event)" class="bg-blue-600 p-3 rounded-full text-white"><i data-lucide="share-2"></i></button>
                    <button onclick="del(${f.id}, event); closeViewer();" class="bg-red-600 p-3 rounded-full text-white"><i data-lucide="trash-2"></i></button>
                `;
                
                document.getElementById('viewer').style.display = 'flex';
                lucide.createIcons();
            };
        }

        function closeViewer() { document.getElementById('viewer').style.display = 'none'; }

        async function shareFile(id, e) {
            if(e) e.stopPropagation();
            db.transaction("files").objectStore("files").get(id).onsuccess = async ev => {
                const f = ev.target.result;
                const blob = await (await fetch(f.data)).blob();
                const file = new File([blob], f.name, { type: blob.type });
                if (navigator.share) navigator.share({ files: [file], title: f.name });
            };
        }

        function downloadReal(id, e) {
            if(e) e.stopPropagation();
            db.transaction("files").objectStore("files").get(id).onsuccess = ev => {
                const f = ev.target.result;
                const a = document.createElement("a");
                a.href = f.data;
                a.download = f.name;
                a.click();
            };
        }

        function downloadCompose(id, e) {
            if(e) e.stopPropagation();
            db.transaction("files").objectStore("files").get(id).onsuccess = ev => {
                const f = ev.target.result;
                const text = `FILE REPORT\nName: ${f.name}\nType: ${f.type}\nUploaded: ${f.timestamp}\nID: ${f.id}`;
                const a = document.createElement("a");
                a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
                a.download = `Compose_${f.name}.txt`;
                a.click();
            };
        }

        function del(id, e) {
            if(e) e.stopPropagation();
            if(confirm("Permanently delete this file from gallery?")) {
                db.transaction("files", "readwrite").objectStore("files").delete(id).onsuccess = render;
            }
        }

        // Notes
        function drawNotes() {
            document.getElementById('not-ctx').innerHTML = config.notes.map(n => `
                <div class="media-card flex justify-between items-center" onclick="editNote(${n.id}, event)">
                    <div class="flex items-center gap-3">
                        <i data-lucide="file-text" class="text-green-500"></i>
                        <span class="font-bold text-sm">${n.title}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="delNote(${n.id}, event)" class="p-2 text-red-400 hover:bg-red-400/10 rounded-lg"><i data-lucide="trash" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function createNote(e) { e.stopPropagation(); const t = prompt("Title:"); if(t) { config.notes.push({id:Date.now(), title:t, content:""}); save(); render(); } }
        function editNote(id, e) { e.stopPropagation(); activeNote = config.notes.find(n=>n.id===id); document.getElementById('edTitle').value = activeNote.title; document.getElementById('edBody').value = activeNote.content; document.getElementById('editorModal').style.display='flex'; }
        function saveNote() { if(activeNote) { activeNote.title = document.getElementById('edTitle').value; activeNote.content = document.getElementById('edBody').value; save(); render(); } document.getElementById('editorModal').style.display='none'; }
        function delNote(id, e) { e.stopPropagation(); config.notes = config.notes.filter(n=>n.id!==id); save(); render(); }

        function expand(id) {
            const p = document.getElementById(id);
            if(p.classList.contains('expanded')) document.querySelectorAll('.panel').forEach(x=>x.classList.remove('expanded','hidden'));
            else document.querySelectorAll('.panel').forEach(x=>x.id===id?x.classList.add('expanded'):x.classList.add('hidden'));
        }

        function save() { localStorage.setItem('hv_v6', JSON.stringify(config)); }
        function toggleTheme() { config.theme = config.theme==='dark'?'light':'dark'; applyTheme(); }
        function applyTheme() {
            document.getElementById('appBody').className = config.theme==='light'?'light-mode':'';
            document.getElementById('themeIcon').setAttribute('data-lucide', config.theme==='light'?'moon':'sun');
            lucide.createIcons();
            save();
        }

        window.onload = applyTheme;
    </script>
</body>
</html>
