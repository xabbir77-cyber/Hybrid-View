<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid View | Advanced Hub</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --primary: #8b5cf6;
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --text-main: #f8fafc;
        }

        .light-mode {
            --bg-dark: #f1f5f9;
            --card-dark: #ffffff;
            --text-main: #1e293b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: background 0.3s ease;
        }

        /* 3-Column Layout */
        .main-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            height: calc(100vh - 90px);
            margin-top: 75px;
            padding: 15px;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                overflow-y: auto;
                height: auto;
            }
        }

        .panel {
            background: var(--card-dark);
            border-radius: 28px;
            padding: 24px;
            overflow-y: auto;
            position: relative;
            border: 1px solid rgba(139, 92, 246, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .panel.is-expanded {
            position: fixed;
            top: 75px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            z-index: 50;
        }

        .panel.is-hidden { display: none; }

        .back-btn {
            display: none;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
            align-items: center;
            gap: 8px;
            width: fit-content;
        }

        .is-expanded .back-btn { display: flex; }

        /* Media Grid */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .media-card {
            background: rgba(139, 92, 246, 0.05);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid rgba(139, 92, 246, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .media-card:hover {
            transform: translateY(-5px);
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--primary);
        }

        .glass-nav {
            background: var(--card-dark);
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
            backdrop-filter: blur(12px);
        }

        /* Note Editor Overlay */
        #noteEditor {
            position: fixed;
            inset: 0;
            background: var(--card-dark);
            z-index: 100;
            display: none;
            padding: 30px;
            flex-direction: column;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        
        .upload-btn {
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body id="appBody">

    <!-- Invisible Uploaders -->
    <input type="file" id="imgUpload" accept="image/*" class="hidden">
    <input type="file" id="vidUpload" accept="video/*" class="hidden">

    <!-- Header -->
    <nav class="fixed top-0 left-0 w-full z-50 glass-nav px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-purple-600 p-2 rounded-xl">
                <i data-lucide="layers" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-xl font-black">Hybrid <span class="text-purple-500">View</span></h1>
        </div>

        <div class="flex-1 max-w-md mx-6">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search vault..." class="w-full bg-slate-100 dark:bg-slate-800/60 rounded-xl py-2 pl-10 pr-4 text-sm focus:outline-none focus:ring-2 ring-purple-500/30">
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <div class="hidden sm:block text-[10px] font-bold text-green-500 bg-green-500/10 px-3 py-1.5 rounded-full">ACTIVE ENGINE</div>
            <button onclick="toggleTheme()" class="p-2 text-purple-500"><i data-lucide="sun" id="themeIcon"></i></button>
        </div>
    </nav>

    <!-- Content Area -->
    <div id="mainHub" class="main-container">
        <!-- Gallery -->
        <div id="gallery-panel" class="panel" onclick="expandPanel('gallery-panel')">
            <div class="back-btn" onclick="collapseAll(event)"><i data-lucide="arrow-left"></i> Hub</div>
            <h2 class="text-lg font-bold flex items-center gap-3 text-blue-500 mb-6"><i data-lucide="image"></i> Gallery</h2>
            <div id="gallery-content" class="grid-view"></div>
            <button class="absolute bottom-6 right-6 bg-blue-600 p-4 rounded-2xl upload-btn text-white" onclick="triggerFile('imgUpload', event)">
                <i data-lucide="plus"></i>
            </button>
        </div>

        <!-- Videos -->
        <div id="video-panel" class="panel" onclick="expandPanel('video-panel')">
            <div class="back-btn" onclick="collapseAll(event)"><i data-lucide="arrow-left"></i> Hub</div>
            <h2 class="text-lg font-bold flex items-center gap-3 text-red-500 mb-6"><i data-lucide="play"></i> Video Vault</h2>
            <div id="video-content" class="grid-view"></div>
            <button class="absolute bottom-6 right-6 bg-red-600 p-4 rounded-2xl upload-btn text-white" onclick="triggerFile('vidUpload', event)">
                <i data-lucide="plus"></i>
            </button>
        </div>

        <!-- Notes -->
        <div id="note-panel" class="panel" onclick="expandPanel('note-panel')">
            <div class="back-btn" onclick="collapseAll(event)"><i data-lucide="arrow-left"></i> Hub</div>
            <h2 class="text-lg font-bold flex items-center gap-3 text-green-500 mb-6"><i data-lucide="file-text"></i> Smart Notes</h2>
            <div id="note-content" class="grid-view"></div>
            <button class="absolute bottom-6 right-6 bg-green-600 p-4 rounded-2xl upload-btn text-white" onclick="createNewNote(event)">
                <i data-lucide="plus"></i>
            </button>
        </div>
    </div>

    <!-- Notebook Editor -->
    <div id="noteEditor">
        <div class="max-w-4xl mx-auto w-full flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold" id="editorTitle">Untitled</h3>
                <button onclick="saveNote()" class="bg-purple-600 px-8 py-3 rounded-2xl text-white font-bold">Save & Close</button>
            </div>
            <textarea id="editorBody" class="flex-1 bg-slate-100 dark:bg-slate-800/50 p-6 rounded-3xl outline-none resize-none text-xl"></textarea>
        </div>
    </div>

    <script>
        // Global State & IndexedDB (for large files)
        let config = JSON.parse(localStorage.getItem('hybrid_view_settings')) || { notes: [], theme: 'dark' };
        let currentNote = null;
        let searchKeyword = "";
        let db;

        // Initialize Database
        const dbReq = indexedDB.open("HybridViewDB", 1);
        dbReq.onupgradeneeded = e => e.target.result.createObjectStore("files", { keyPath: "id" });
        dbReq.onsuccess = e => { db = e.target.result; renderEverything(); };

        // --- File System ---
        function triggerFile(id, e) {
            e.stopPropagation();
            document.getElementById(id).click();
        }

        document.getElementById('imgUpload').onchange = e => uploadToStore(e, 'image');
        document.getElementById('vidUpload').onchange = e => uploadToStore(e, 'video');

        function uploadToStore(e, type) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = res => {
                const tx = db.transaction("files", "readwrite");
                tx.objectStore("files").add({
                    id: Date.now(),
                    type: type,
                    name: file.name,
                    data: res.target.result
                });
                tx.oncomplete = () => renderEverything();
            };
            reader.readAsDataURL(file);
        }

        function renderEverything() {
            if (!db) return;
            const tx = db.transaction("files", "readonly");
            tx.objectStore("files").getAll().onsuccess = e => {
                const files = e.target.result.filter(f => f.name.toLowerCase().includes(searchKeyword.toLowerCase()));
                
                // Render Gallery
                const galleryList = files.filter(f => f.type === 'image');
                document.getElementById('gallery-content').innerHTML = galleryList.map(f => `
                    <div class="media-card group" onclick="openFile(${f.id}, event)">
                        <img src="${f.data}" class="w-full h-24 object-cover rounded-xl shadow-sm">
                        <div class="text-[10px] truncate mt-2 font-bold opacity-60 px-1">${f.name}</div>
                        <button onclick="deleteFile(${f.id}, event)" class="absolute top-2 right-2 p-1 bg-red-500 rounded-lg text-white opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </div>
                `).join('');

                // Render Video
                const videoList = files.filter(f => f.type === 'video');
                document.getElementById('video-content').innerHTML = videoList.map(f => `
                    <div class="media-card group" onclick="openFile(${f.id}, event)">
                        <div class="bg-black h-24 rounded-xl flex items-center justify-center"><i data-lucide="play" class="text-white w-8 h-8"></i></div>
                        <div class="text-[10px] truncate mt-2 font-bold opacity-60 px-1">${f.name}</div>
                        <button onclick="deleteFile(${f.id}, event)" class="absolute top-2 right-2 p-1 bg-red-500 rounded-lg text-white opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                    </div>
                `).join('');
                
                renderNotes();
                lucide.createIcons();
            };
        }

        function openFile(id, e) {
            e.stopPropagation();
            db.transaction("files").objectStore("files").get(id).onsuccess = ev => {
                const f = ev.target.result;
                const win = window.open();
                win.document.write(`<body style="margin:0;background:#000;display:flex;align-items:center;justify-center;height:100vh">${f.type === 'image' ? `<img src="${f.data}" style="max-width:100%;max-height:100%">` : `<video src="${f.data}" controls autoplay style="max-width:100%;max-height:100%"></video>`}</body>`);
            };
        }

        function deleteFile(id, e) {
            e.stopPropagation();
            if(confirm("Delete this file?")) {
                db.transaction("files", "readwrite").objectStore("files").delete(id).onsuccess = () => renderEverything();
            }
        }

        // --- Note System ---
        function createNewNote(e) {
            e.stopPropagation();
            const t = prompt("Note Title:");
            if (t) {
                config.notes.push({ id: Date.now(), title: t, content: "" });
                saveAndRefresh();
            }
        }

        function renderNotes() {
            const filtered = config.notes.filter(n => n.title.toLowerCase().includes(searchKeyword.toLowerCase()));
            document.getElementById('note-content').innerHTML = filtered.map(n => `
                <div class="media-card group" onclick="openNote(${n.id}, event)">
                    <i data-lucide="file-text" class="text-green-500 w-10 h-10 mx-auto mt-4"></i>
                    <div class="text-[11px] font-bold mt-4 truncate px-2">${n.title}</div>
                    <button onclick="deleteNote(${n.id}, event)" class="absolute top-2 right-2 p-1 bg-red-500 rounded-lg text-white opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                </div>
            `).join('');
        }

        function openNote(id, e) {
            e.stopPropagation();
            currentNote = config.notes.find(n => n.id === id);
            document.getElementById('editorTitle').innerText = currentNote.title;
            document.getElementById('editorBody').value = currentNote.content;
            document.getElementById('noteEditor').style.display = 'flex';
        }

        function saveNote() {
            if (currentNote) {
                currentNote.content = document.getElementById('editorBody').value;
                saveAndRefresh();
            }
            document.getElementById('noteEditor').style.display = 'none';
        }

        function deleteNote(id, e) {
            e.stopPropagation();
            config.notes = config.notes.filter(n => n.id !== id);
            saveAndRefresh();
        }

        // --- Layout Utils ---
        function expandPanel(id) {
            const panel = document.getElementById(id);
            if (panel.classList.contains('is-expanded')) return;
            document.querySelectorAll('.panel').forEach(p => {
                if(p.id === id) p.classList.add('is-expanded');
                else p.classList.add('is-hidden');
            });
        }

        function collapseAll(e) {
            e.stopPropagation();
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('is-expanded', 'is-hidden'));
        }

        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value;
            renderEverything();
        }

        function toggleTheme() {
            config.theme = config.theme === 'dark' ? 'light' : 'dark';
            applyTheme();
        }

        function applyTheme() {
            const body = document.getElementById('appBody');
            const icon = document.getElementById('themeIcon');
            config.theme === 'light' ? body.classList.add('light-mode') : body.classList.remove('light-mode');
            icon.setAttribute('data-lucide', config.theme === 'light' ? 'moon' : 'sun');
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('hybrid_view_settings', JSON.stringify(config));
            renderEverything();
        }

        window.onload = applyTheme;
    </script>
</body>
</html>
